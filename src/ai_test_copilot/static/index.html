<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI 测试助手</title>
<style>
  :root{
    --bg:#0e1016; --bg2:#141823; --card:#1a1f2e; --line:#283044; --line2:#323b52;
    --fg:#e8eaf0; --dim:#9aa3b5; --accent:#5b8cff; --accent2:#7aa2ff;
    --green:#3fb950; --red:#f85149; --amber:#d29922; --violet:#bc8cff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -200px,#1b2236,var(--bg));color:var(--fg);
       font:15px/1.6 -apple-system,Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh}
  header{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
  .logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--violet));
        display:grid;place-items:center;font-size:19px}
  header h1{margin:0;font-size:18px;letter-spacing:.3px}
  header .sub{margin:2px 0 0;color:var(--dim);font-size:12.5px}
  header .status{margin-left:auto;color:var(--dim);font-size:12px;text-align:right}
  main{max-width:1000px;margin:0 auto;padding:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;
        box-shadow:0 1px 0 rgba(255,255,255,.02) inset}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:10px;overflow:hidden}
  .seg button{background:transparent;color:var(--dim);border:none;padding:8px 18px;cursor:pointer;font-size:14px}
  .seg button.on{background:var(--accent);color:#fff}
  .feishu{display:flex;gap:8px;margin:14px 0 12px}
  .feishu input{flex:1;background:var(--bg2);color:var(--fg);border:1px solid var(--line2);border-radius:9px;padding:9px 12px;font-size:14px}
  .feishu input::placeholder{color:#6b7488}
  button.ghost{background:var(--bg2);color:var(--fg);border:1px solid var(--line2);border-radius:9px;padding:9px 14px;cursor:pointer;white-space:nowrap}
  button.ghost:hover{border-color:var(--accent)}
  button:disabled{opacity:.55;cursor:default}
  textarea{width:100%;min-height:230px;background:var(--bg2);color:var(--fg);border:1px solid var(--line2);
           border-radius:11px;padding:14px;font:13px/1.6 ui-monospace,Menlo,Consolas,monospace;resize:vertical}
  textarea:focus,.feishu input:focus{outline:none;border-color:var(--accent)}
  .bar{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}
  .go{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;
      padding:10px 26px;cursor:pointer;font-size:15px;font-weight:600}
  .pw{margin-left:auto;display:flex;align-items:center;gap:8px}
  .pw input{background:var(--bg2);color:var(--fg);border:1px solid var(--line2);border-radius:9px;padding:8px 11px;width:170px}
  .dim{color:var(--dim);font-size:13px}
  .spinner{width:15px;height:15px;border:2px solid var(--line2);border-top-color:var(--accent);border-radius:50%;
           display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px}
  @keyframes spin{to{transform:rotate(360deg)}}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--dim);font-weight:600;font-size:12px}
  tr:last-child td{border-bottom:none}
  .tag{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;border:1px solid var(--line2)}
  .t-functional{color:#7ee787;border-color:#2ea04326}
  .t-boundary{color:#79c0ff;border-color:#1f6feb26}
  .t-negative{color:#ffa657;border-color:#d2992226}
  .t-security{color:#ff7b72;border-color:#f8514926}
  .t-performance{color:#d2a8ff;border-color:#bc8cff26}
  .p0{color:#ff7b72;font-weight:600}.p1{color:#ffa657}.p2{color:var(--dim)}
  .err{color:var(--red)}
  ul{margin:6px 0;padding-left:20px}
  h3.section{margin:18px 0 8px;font-size:14px;color:var(--accent2)}
  .meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:6px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--line2);
         padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="logo">🧪</div>
  <div>
    <h1>AI 测试助手</h1>
    <div class="sub">从需求生成测试用例 · 从失败日志定位根因</div>
  </div>
  <div class="status" id="status-line">连接中…</div>
</header>

<main>
  <div class="card">
    <div class="seg">
      <button id="m-generate" class="on" onclick="setMode('generate')">📝 生成用例</button>
      <button id="m-analyze" onclick="setMode('analyze')">🔍 分析失败</button>
    </div>

    <div class="feishu" id="feishu-row">
      <input type="text" id="feishu-url" placeholder="粘贴飞书文档链接（/docx/ 或 /wiki/）自动拉取正文…" />
      <button class="ghost" id="fetch-btn" onclick="fetchFeishu()">📄 拉取飞书文档</button>
    </div>

    <textarea id="input" placeholder="在此粘贴需求/接口描述，或测试失败日志（也可用上面的飞书链接拉取）…"></textarea>

    <div class="bar">
      <button class="go" id="go" onclick="run()">运行</button>
      <span class="dim" id="run-status"></span>
      <span class="dim" id="charcount"></span>
      <span class="pw"><span class="dim">🔒</span><input type="password" id="pw" placeholder="访问密码" /></span>
    </div>
  </div>

  <div id="out"></div>
</main>
<div class="toast" id="toast"></div>

<script>
let mode = "generate";
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

function setMode(m){
  mode = m;
  $("m-generate").classList.toggle("on", m==="generate");
  $("m-analyze").classList.toggle("on", m==="analyze");
  $("input").placeholder = m==="generate"
    ? "在此粘贴需求/接口描述（也可用上面的飞书链接拉取）…"
    : "在此粘贴测试失败日志（也可用上面的飞书链接拉取）…";
}

const pwBox = $("pw");
pwBox.value = localStorage.getItem("app_pw") || "";
pwBox.addEventListener("input", () => localStorage.setItem("app_pw", pwBox.value));

$("input").addEventListener("input", updateCount);
function updateCount(){ const n=$("input").value.length; $("charcount").textContent = n? n+" 字":""; }

function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); }
function headers(){ return {"Content-Type":"application/json","X-App-Password":pwBox.value}; }

// 启动时探测后端能力
fetch("/healthz").then(r=>r.json()).then(d=>{
  const parts = ["版本 "+d.version];
  parts.push(d.feishu_configured ? "飞书 ✓" : "飞书未配置");
  parts.push(d.auth_required ? "需密码" : "无需密码");
  $("status-line").textContent = parts.join("　·　");
  if(!d.feishu_configured){ $("feishu-url").placeholder="飞书未配置（服务器需设 FEISHU_APP_ID/SECRET）"; }
}).catch(()=>{ $("status-line").textContent="无法连接后端"; });

async function fetchFeishu(){
  const url = $("feishu-url").value.trim();
  if(!url){ toast("请先粘贴飞书文档链接"); return; }
  const btn = $("fetch-btn");
  btn.disabled = true; const old = btn.textContent; btn.innerHTML = '<span class="spinner"></span> 拉取中';
  try{
    const resp = await fetch("/api/feishu/fetch", {method:"POST",headers:headers(),body:JSON.stringify({url})});
    const data = await resp.json();
    if(!resp.ok){ toast(data.detail || ("失败 "+resp.status)); return; }
    $("input").value = data.text; updateCount();
    toast("已拉取 "+data.chars+" 字");
  }catch(e){ toast("请求失败："+e.message); }
  finally{ btn.disabled=false; btn.textContent=old; }
}

async function run(){
  const text = $("input").value.trim();
  if(!text){ $("out").innerHTML='<div class="card err">请输入内容</div>'; return; }
  const btn = $("go");
  btn.disabled = true; $("run-status").innerHTML='<span class="spinner"></span> 模型思考中…'; $("out").innerHTML="";
  try{
    const resp = await fetch("/api/"+mode, {method:"POST",headers:headers(),body:JSON.stringify({text})});
    const data = await resp.json();
    if(!resp.ok){ $("out").innerHTML=`<div class="card err">${esc(data.detail||resp.status)}</div>`; return; }
    $("out").innerHTML = mode==="generate" ? renderPlan(data) : renderAnalysis(data);
  }catch(e){ $("out").innerHTML=`<div class="card err">请求失败：${esc(e.message)}</div>`; }
  finally{ btn.disabled=false; $("run-status").textContent=""; }
}

function renderPlan(p){
  const rows = p.test_cases.map(tc=>`<tr>
    <td>${esc(tc.id)}</td>
    <td><span class="tag t-${esc(tc.type)}">${esc(tc.type)}</span></td>
    <td class="${esc((tc.priority||'').toLowerCase())}">${esc(tc.priority)}</td>
    <td>${esc(tc.title)}<div class="dim" style="margin-top:3px">步骤：${tc.steps.map(esc).join(" → ")}</div></td>
    <td>${esc(tc.expected_result)}</td></tr>`).join("");
  return `<div class="card">
    <b>${esc(p.feature)}</b><div class="dim">${esc(p.summary)}</div>
    <table style="margin-top:12px">
    <tr><th>编号</th><th>类型</th><th>优先级</th><th>标题 / 步骤</th><th>预期结果</th></tr>${rows}</table>
    <div class="bar"><span class="dim">共 ${p.test_cases.length} 条用例</span>
    <button class="ghost" onclick='copyJSON(${JSON.stringify(JSON.stringify(p))})'>复制 JSON</button></div>
  </div>`;
}

function renderAnalysis(a){
  return `<div class="card">
    <b style="font-size:16px">${esc(a.summary)}</b>
    <div class="meta">
      <span class="dim">归类：<span class="tag t-${a.category==='product_bug'?'security':a.category==='test_bug'?'boundary':'performance'}">${esc(a.category)}</span></span>
      <span class="dim">置信度：${Math.round(a.confidence*100)}%</span>
    </div>
    <h3 class="section">根因</h3><div>${esc(a.root_cause)}</div>
    ${a.evidence&&a.evidence.length?`<h3 class="section">关键证据</h3><ul>${a.evidence.map(e=>`<li>${esc(e)}</li>`).join("")}</ul>`:""}
    <h3 class="section">修复建议</h3><ul>${a.suggested_fixes.map(f=>`<li>${esc(f)}</li>`).join("")}</ul>
    <div class="bar"><button class="ghost" onclick='copyJSON(${JSON.stringify(JSON.stringify(a))})'>复制 JSON</button></div>
  </div>`;
}

function copyJSON(s){ navigator.clipboard.writeText(s).then(()=>toast("已复制 JSON")); }
</script>
</body>
</html>
